name: Task
description: Standard task for agents
title: "[TASK] "
labels: ["task"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What does done look like?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links, background, constraints
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (today)
        - P1 (this week)
        - P2 (backlog)
      default: 1
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of checks
